{% extends "base.html" %}

{% block content %}

<h1>Registered Users</h1>

{% if users %}

<table>
    <tr>
        <th>ID</th>
        <th>Full Name</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.full_name }}</td>
        <td>{{ user.email }}</td>
        <td>
            <a href="{{ url_for('profile', user_id=user.id) }}">View</a>
            |
            <a href="{{ url_for('update', user_id=user.id) }}">Update</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% else %}

<p>No users have been registered yet.</p>

{% endif %}

{% endblock %}
