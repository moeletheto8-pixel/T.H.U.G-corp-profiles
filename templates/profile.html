{% extends "base.html" %}

{% block content %}

<h1>User Profile</h1>

<div class="card">
    <p><strong>ID:</strong> {{ user.id }}</p>
    <p><strong>Full Name:</strong> {{ user.full_name }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Phone:</strong> {{ user.phone }}</p>
    <p><strong>Bio:</strong> {{ user.bio }}</p>
</div>

<a class="button-link" href="{{ url_for('update', user_id=user.id) }}">
    Update Profile
</a>

<a class="button-link" href="{{ url_for('register') }}">
    Back to Register
</a>

{% endblock %}
